name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install lint tools
        run: python -m pip install --require-hashes -r requirements-dev.lock

      - name: Lint the active code path
        run: |
          git ls-files -z '*.py' \
            | while IFS= read -r -d '' file; do
                case "$file" in archive/*|ViennaPS/*) ;; *) printf '%s\0' "$file" ;; esac
              done \
            | xargs -0 ruff check

      - name: Type-check the active code path
        run: |
          ty check --python-version 3.13 \
            --ignore unresolved-import --ignore unused-ignore-comment \
            tsv_process.py \
            traveler_metrics.py \
            full_2d_layer_metrics.py \
            layer_process_models.py \
            morphology_fill_control.py \
            copper_fill_transport_3d.py \
            build_screening_traveler.py \
            build_cu_fill_replay.py \
            build_candidate_cu_replay.py \
            build_step_experiments.py \
            build_explainer.py \
            build_ray_benefit_review.py \
            build_numerical_performance_data.py \
            build_bosch_tutorial_data.py \
            build_bosch_trajectory_replay.py \
            build_knob_registry.py \
            build_active_experiment_contract.py \
            build_pattern_bosch_measurement_contract.py \
            build_pattern_bosch_metric_controls.py \
            build_pattern_bosch_unavailable_profile_review.py \
            build_pattern_bosch_factor_projection.py \
            build_pattern_bosch_range_pilot.py \
            build_pattern_bosch_range_pilot_review.py \
            build_bosch_ray_phase_a_review.py \
            bosch_ray_phase_b.py \
            build_bosch_ray_phase_b_review.py \
            v3_bosch_clean_ray_ladder.py \
            review_v3_bosch_clean_ray_ladder.py \
            scripts/autoresearch_event_log.py \
            scripts/validate_evidence.py \
            test_ray_benefit_review.py \
            process_config.py

      - name: Validate published evidence schemas
        run: |
          python build_numerical_evidence_bundle.py --check
          python build_ray_benefit_review.py
          python scripts/validate_evidence.py evidence/numerical/ray_benefit_review.json schemas/ray-benefit-review.schema.json
          python build_numerical_performance_data.py
          python scripts/validate_evidence.py numerical_performance_data.json schemas/numerical-performance.schema.json
          python scripts/validate_evidence.py bosch_tutorial_data.json schemas/bosch-tutorial.schema.json
          python scripts/validate_evidence.py step_experiments.json schemas/step-experiments.schema.json
          python scripts/validate_evidence.py cu_fill_replay.json schemas/cu-fill-replay.schema.json
          python scripts/validate_evidence.py candidate_cu_replay.json schemas/candidate-cu-replay.schema.json
          python scripts/validate_evidence.py bosch_trajectory_replay.json schemas/bosch-trajectory-replay.schema.json
          python scripts/validate_evidence.py factor_registry.json schemas/factor-registry.schema.json
          python scripts/validate_evidence.py active_experiment_contract.json schemas/active-experiment-contract.schema.json
          python scripts/validate_evidence.py pattern_bosch_measurement_contract.json schemas/pattern-bosch-measurement-contract.schema.json
          python scripts/validate_evidence.py evidence/bosch/pattern_bosch_metric_controls.json schemas/pattern-bosch-metric-controls.schema.json
          python scripts/validate_evidence.py evidence/bosch/pattern_bosch_unavailable_profile_review.json schemas/pattern-bosch-unavailable-profile-review.schema.json
          python scripts/validate_evidence.py pattern_bosch_factor_projection.json schemas/pattern-bosch-factor-projection.schema.json
          python scripts/validate_evidence.py pattern_bosch_range_pilot_review.json schemas/pattern-bosch-range-pilot-review.schema.json
          python scripts/validate_evidence.py evidence/numerical/bosch_grid_preflight.json schemas/bosch-grid-preflight.schema.json
          python scripts/validate_evidence.py evidence/numerical/bosch_ray_phase_a_review.json schemas/bosch-ray-phase-a-review.schema.json
          python scripts/validate_evidence.py evidence/numerical/bosch_ray_phase_b_review.json schemas/bosch-ray-phase-b-review.schema.json
          python scripts/validate_evidence.py docs/range-research-log.json schemas/range-research-log.schema.json
          python test_evidence_schema.py
          python test_ray_benefit_review.py
          python test_autoresearch_event_schema.py
          python test_autoresearch_event_log.py
          git diff --exit-code -- numerical_performance_data.json
          git diff --exit-code -- evidence/numerical/ray_benefit_review.json

      - name: Compile Python sources
        run: |
          python -m compileall -q \
            -x '(^|/)(\.venv|autoresearch-results|\.scratch)/' .

      - name: Run dependency-free checks
        run: |
          python scripts/run_capability_tests.py plan
          python test_process_config.py
          python test_factor_registry_provenance.py
          python test_active_experiment_contract.py
          python test_pattern_bosch_measurement_contract.py
          python test_pattern_bosch_metric_controls.py
          python test_pattern_bosch_factor_projection.py
          python test_pattern_bosch_range_pilot.py
          python test_pattern_bosch_range_pilot_bundle.py
          python test_pattern_bosch_range_pilot_recovery.py
          python test_pattern_bosch_range_pilot_review.py
          python test_bosch_ray_phase_a_review.py
          python test_bosch_ray_phase_b_review.py
          python test_freeze_pattern_bosch_screen_manifest.py
          python test_publication_data.py

      - name: Rebuild the explainer
        run: |
          python build_explainer.py
          git diff --exit-code -- explainer.html

      - name: Check embedded JavaScript
        run: |
          script_file="$(mktemp)"
          sed -n '/<script>/,/<\/script>/p' explainer.html | sed '1d;$d' > "$script_file"
          node --check --input-type=commonjs < "$script_file"

      - name: Install browser
        run: python -m playwright install --with-deps chromium

      - name: Test rendered explainer
        run: python test_explainer_visual.py
