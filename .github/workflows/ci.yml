name: ci

on:
  push:
  pull_request:

jobs:
  tutorial:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check src tests examples site
      - run: uv run ruff format --check src tests examples site
      - run: uv run ty check src/viennaps_hbm/config.py src/viennaps_hbm/tutorial.py tests/test_tutorial_smoke.py
      - run: uv run tsv-tutorial
      - run: uv run python tests/test_tutorial_smoke.py
