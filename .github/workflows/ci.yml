name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install lint tools
        run: python -m pip install --require-hashes -r requirements-dev.lock

      - name: Lint the active code path
        run: |
          git ls-files -z '*.py' \
            | while IFS= read -r -d '' file; do
                case "$file" in archive/*|ViennaPS/*) ;; *) printf '%s\0' "$file" ;; esac
              done \
            | xargs -0 ruff check

      - name: Type-check the active code path
        run: |
          ty check --python-version 3.13 \
            --ignore unresolved-import --ignore unused-ignore-comment \
            tsv_process.py \
            traveler_metrics.py \
            profile_shape_metrics.py \
            full_2d_layer_metrics.py \
            layer_process_models.py \
            morphology_fill_control.py \
            copper_fill_transport_3d.py \
            build_screening_traveler.py \
            scripts/build/build_cu_fill_replay.py \
            scripts/build/build_candidate_cu_replay.py \
            build_step_experiments.py \
            scripts/build/build_explainer.py \
            build_ray_benefit_review.py \
            scripts/build/build_numerical_performance_data.py \
            scripts/build/build_bosch_tutorial_data.py \
            scripts/build/build_bosch_trajectory_replay.py \
            build_knob_registry.py \
            scripts/build/build_active_experiment_contract.py \
            build_pattern_bosch_measurement_contract.py \
            build_pattern_bosch_metric_controls.py \
            scripts/build/build_pattern_bosch_unavailable_profile_review.py \
            build_pattern_bosch_factor_projection.py \
            build_pattern_bosch_range_pilot.py \
            scripts/build/build_pattern_bosch_range_pilot_review.py \
            build_bosch_ray_phase_a_review.py \
            bosch_ray_phase_b.py \
            build_bosch_ray_phase_b_review.py \
            v3_bosch_clean_ray_ladder.py \
            review_v3_bosch_clean_ray_ladder.py \
            scripts/autoresearch_event_log.py \
            scripts/validate_evidence.py \
            tests/test_ray_benefit_review.py \
            process_config.py

      - name: Validate published evidence schemas
        run: scripts/check_published_evidence.sh

      - name: Compile Python sources
        run: |
          python -m compileall -q \
            -x '(^|/)(\.venv|autoresearch-results|\.scratch)/' .

      - name: Run dependency-free checks
        run: |
          python scripts/run_capability_tests.py plan
          python -m tests.test_process_config
          python -m tests.test_factor_registry_provenance
          python -m tests.test_active_experiment_contract
          python -m tests.test_pattern_bosch_measurement_contract
          python -m tests.test_pattern_bosch_metric_controls
          python -m tests.test_pattern_bosch_factor_projection
          python -m tests.test_pattern_bosch_range_pilot
          python -m tests.test_pattern_bosch_range_pilot_bundle
          python -m tests.test_pattern_bosch_range_pilot_recovery
          python -m tests.test_pattern_bosch_range_pilot_review
          python -m tests.test_bosch_ray_phase_a_review
          python -m tests.test_bosch_ray_phase_b_review
          python -m tests.test_freeze_pattern_bosch_screen_manifest
          python -m tests.test_profile_shape_metrics
          python -m tests.test_publication_data

      - name: Rebuild the explainer
        run: |
          python -m scripts.build.build_explainer
          git diff --exit-code -- explainer.html

      - name: Check embedded JavaScript
        run: |
          script_file="$(mktemp)"
          sed -n '/<script>/,/<\/script>/p' explainer.html | sed '1d;$d' > "$script_file"
          node --check --input-type=commonjs < "$script_file"

      - name: Install browser
        run: python -m playwright install --with-deps chromium

      - name: Test rendered explainer
        run: python -m tests.test_explainer_visual
